<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bobo's Worm Feast</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #87CEEB; font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif; }
  #gameCanvas { display: block; width: 100vw; height: 100vh; }
  #muteBtn { position: absolute; top: 10px; right: 10px; width: 50px; height: 50px; border: none; border-radius: 50%; background: #FFD700; font-size: 24px; cursor: pointer; z-index: 10; box-shadow: 0 4px 0 #DAA520; }
  #muteBtn:active { transform: translateY(4px); box-shadow: 0 0 0 #DAA520; }
</style>
</head>
<body>
<button id="muteBtn">🔊</button>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

// Audio
let audioCtx = null, muted = false;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}
function playTone(freq, type, duration, vol = 0.15, when = 0) {
  if (muted || !audioCtx) return;
  const t = audioCtx.currentTime + when;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(t);
  osc.stop(t + duration);
}
function playChomp() {
  if (muted || !audioCtx) return;
  playTone(300, 'sawtooth', 0.1, 0.2);
  playTone(450, 'square', 0.08, 0.1, 0.05);
}
function playPop() {
  if (muted || !audioCtx) return;
  playTone(200, 'sine', 0.15, 0.25);
  playTone(300, 'sine', 0.1, 0.15, 0.05);
}
function playWin() {
  if (muted || !audioCtx) return;
  [523, 659, 784, 1047].forEach((f, i) => playTone(f, 'sine', 0.3, 0.15, i * 0.15));
}
function playMiss() {
  if (muted || !audioCtx) return;
  playTone(150, 'triangle', 0.2, 0.1);
}

// Game state
const foodsNeeded = 12;
let foods = [];
let tubeFoods = []; // foods inside worm tubes
let poopedFoods = []; // foods flying out
let gameOver = false;
let spawnTimer = 0;
let spawnInterval = 60;
let score = 0;
let worm1 = { x: 0, y: 0, w: 90, h: 120, color: '#FF69B4', targetX: 0 };
let worm2 = { x: 0, y: 0, w: 90, h: 120, color: '#32CD32', targetX: 0 };
let draggedWorm = null;
let foodTypes = ['🍎','🍐','🥕','🍇','🍒','🍃'];
let particles = [];
let winTime = 0;
let buttonPressed = false;
let buttonAnim = 0;

// Button rect (set in draw)
let outBtn = { x: 0, y: 0, w: 140, h: 70 };

function resetGame() {
  foods = [];
  tubeFoods = [];
  poopedFoods = [];
  particles = [];
  gameOver = false;
  score = 0;
  spawnTimer = 0;
  winTime = 0;
  buttonPressed = false;
  buttonAnim = 0;
  worm1.targetX = W * 0.25;
  worm1.x = worm1.targetX;
  worm1.y = H - 160;
  worm2.targetX = W * 0.55;
  worm2.x = worm2.targetX;
  worm2.y = H - 160;
}
resetGame();

function spawnFood() {
  const size = 36;
  const margin = Math.min(W, H) * 0.22;
  foods.push({
    x: margin + Math.random() * (W - margin * 2),
    y: -40,
    size: size,
    type: foodTypes[Math.floor(Math.random() * foodTypes.length)],
    speed: 2 + Math.random() * 2,
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.1
  });
}

function addParticles(x, y, color) {
  for (let i = 0; i < 8; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      life: 30,
      color
    });
  }
}

function pressOutButton() {
  if (gameOver) return;
  initAudio();
  buttonPressed = true;
  buttonAnim = 10;
  
  // Find foods that have traveled far enough down the tube
  let released = 0;
  for (let i = tubeFoods.length - 1; i >= 0; i--) {
    let tf = tubeFoods[i];
    if (tf.progress >= 0.6) {
      poopedFoods.push({
        x: tf.worm.x,
        y: tf.worm.y + tf.worm.h/2,
        type: tf.type,
        vx: (Math.random() - 0.5) * 8,
        vy: 3 + Math.random() * 4,
        rot: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.2
      });
      tubeFoods.splice(i, 1);
      released++;
    }
  }
  
  if (released > 0) {
    playPop();
    for (let i = 0; i < released; i++) addParticles(W/2, H - 80, '#8B4513');
    score += released;
    if (score >= foodsNeeded) {
      gameOver = true;
      winTime = Date.now();
      setTimeout(() => playWin(), 200);
    }
  }
}

// Input
function getWormAt(x, y) {
  for (let w of [worm1, worm2]) {
    if (x > w.x - w.w/2 - 20 && x < w.x + w.w/2 + 20 && y > w.y - 20 && y < w.y + w.h + 20) return w;
  }
  return null;
}

function isOnButton(x, y) {
  return x > outBtn.x && x < outBtn.x + outBtn.w && y > outBtn.y && y < outBtn.y + outBtn.h;
}

canvas.addEventListener('mousedown', e => {
  initAudio();
  const r = canvas.getBoundingClientRect();
  const x = e.clientX - r.left, y = e.clientY - r.top;
  if (gameOver) { resetGame(); return; }
  if (isOnButton(x, y)) { pressOutButton(); return; }
  draggedWorm = getWormAt(x, y);
});
canvas.addEventListener('mousemove', e => {
  if (!draggedWorm) return;
  const r = canvas.getBoundingClientRect();
  const x = e.clientX - r.left;
  draggedWorm.targetX = Math.max(60, Math.min(W - 60, x));
});
window.addEventListener('mouseup', () => draggedWorm = null);

canvas.addEventListener('touchstart', e => {
  initAudio();
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  const t = e.touches[0];
  const x = t.clientX - r.left, y = t.clientY - r.top;
  if (gameOver) { resetGame(); return; }
  if (isOnButton(x, y)) { pressOutButton(); return; }
  draggedWorm = getWormAt(x, y);
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!draggedWorm) return;
  const r = canvas.getBoundingClientRect();
  const t = e.touches[0];
  draggedWorm.targetX = Math.max(60, Math.min(W - 60, t.clientX - r.left));
}, {passive:false});
window.addEventListener('touchend', () => draggedWorm = null);

window.addEventListener('keydown', e => {
  initAudio();
  if (gameOver) { resetGame(); return; }
  const step = 25;
  if (e.key === 'ArrowLeft') { worm1.targetX = Math.max(60, worm1.targetX - step); }
  if (e.key === 'ArrowRight') { worm1.targetX = Math.min(W - 60, worm1.targetX + step); }
  if (e.key === 'a' || e.key === 'A') { worm2.targetX = Math.max(60, worm2.targetX - step); }
  if (e.key === 'd' || e.key === 'D') { worm2.targetX = Math.min(W - 60, worm2.targetX + step); }
  if (e.key === ' ' || e.key === 'Enter') { pressOutButton(); }
});

document.getElementById('muteBtn').addEventListener('click', () => {
  muted = !muted;
  document.getElementById('muteBtn').textContent = muted ? '🔇' : '🔊';
});

function drawWorm(w, time) {
  const wobble = Math.sin(time * 0.005 + w.x) * 4;
  const mouthOpen = Math.max(10, 22 + Math.sin(time * 0.008) * 6);
  ctx.save();
  ctx.translate(w.x, w.y + wobble);

  // Body
  ctx.fillStyle = w.color;
  ctx.beginPath();
  ctx.ellipse(0, 35, w.w/2, w.h/2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.lineWidth = 4;
  ctx.strokeStyle = '#333';
  ctx.stroke();

  // --- TUBE WINDOW (see-through belly) ---
  ctx.fillStyle = 'rgba(255, 255, 255, 0.65)';
  ctx.beginPath();
  ctx.ellipse(0, 35, w.w/2 - 14, w.h/2 - 18, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(100, 60, 30, 0.4)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Tube path line
  ctx.strokeStyle = 'rgba(139, 69, 19, 0.5)';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(0, 5);
  ctx.lineTo(0, 75);
  ctx.stroke();

  // Draw foods inside tube
  for (let tf of tubeFoods) {
    if (tf.worm !== w) continue;
    const ty = 5 + tf.progress * 70; // travel from top to bottom of tube
    ctx.font = '20px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(tf.type, 0, ty);
  }

  // Eyes
  ctx.fillStyle = '#FFF';
  ctx.beginPath(); ctx.arc(-20, -15, 14, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle='#333'; ctx.lineWidth=2; ctx.stroke();
  ctx.beginPath(); ctx.arc(20, -15, 14, 0, Math.PI*2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(-18, -15, 5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(22, -15, 5, 0, Math.PI*2); ctx.fill();

  // Mouth
  ctx.fillStyle = '#8B0000';
  ctx.beginPath();
  ctx.ellipse(0, 8, mouthOpen, 16, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Cheeks
  ctx.fillStyle = 'rgba(255,100,100,0.4)';
  ctx.beginPath(); ctx.arc(-30, 10, 8, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(30, 10, 8, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

function drawOutButton() {
  const bw = Math.min(160, W * 0.22);
  const bh = 64;
  const bx = W - bw - 14;
  const by = H - bh - 20;
  outBtn = { x: bx, y: by, w: bw, h: bh };

  const pressOffset = buttonAnim > 0 ? 4 : 0;
  if (buttonAnim > 0) buttonAnim--;

  // Shadow
  ctx.fillStyle = '#B8860B';
  roundRect(bx, by + 6, bw, bh, 16);
  ctx.fill();

  // Button body
  ctx.fillStyle = '#FFD700';
  roundRect(bx, by + pressOffset, bw, bh, 16);
  ctx.fill();
  ctx.strokeStyle = '#DAA520';
  ctx.lineWidth = 4;
  roundRect(bx, by + pressOffset, bw, bh, 16);
  ctx.stroke();

  // Text
  ctx.fillStyle = '#8B4513';
  ctx.font = `bold ${Math.max(18, bw * 0.15)}px Comic Sans MS`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('GO OUT!', bx + bw/2, by + pressOffset + bh/2);
}

function drawGround() {
  ctx.fillStyle = '#228B22';
  ctx.beginPath();
  ctx.ellipse(W/2, H + 80, W * 0.8, 140, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#32CD32';
  ctx.lineWidth = 3;
  for (let i = 0; i < W; i += 40) {
    ctx.beginPath(); ctx.moveTo(i, H - 20); ctx.lineTo(i + 8, H - 45); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(i + 10, H - 18); ctx.lineTo(i + 16, H - 38); ctx.stroke();
  }
}

function drawClouds() {
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  const time = Date.now();
  const clouds = [{x: W*0.15, y: H*0.1, s: 1}, {x: W*0.6, y: H*0.06, s: 0.8}, {x: W*0.85, y: H*0.12, s: 1.1}];
  clouds.forEach(c => {
    const cx = ((c.x + time * 0.02) % (W + 200)) - 100;
    ctx.beginPath(); ctx.arc(cx, c.y, 40 * c.s, 0, Math.PI*2);
    ctx.arc(cx + 35*c.s, c.y - 15*c.s, 45*c.s, 0, Math.PI*2);
    ctx.arc(cx + 70*c.s, c.y, 35*c.s, 0, Math.PI*2);
    ctx.fill();
  });
}

function drawGameOver() {
  const alpha = Math.min(1, (Date.now() - winTime) / 800);
  ctx.fillStyle = `rgba(0,0,0,${alpha * 0.5})`;
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.globalAlpha = alpha;
  const boxW = Math.min(420, W - 40);
  const boxH = 200;
  const bx = (W - boxW)/2, by = (H - boxH)/2;

  ctx.fillStyle = '#FFF';
  roundRect(bx, by, boxW, boxH, 20);
  ctx.fill();
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 6;
  roundRect(bx, by, boxW, boxH, 20);
  ctx.stroke();

  ctx.fillStyle = '#FF4500';
  ctx.font = `bold ${Math.max(24, boxW * 0.09)}px Comic Sans MS`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Good Game, Bobo!', W/2, H/2 - 20);

  ctx.fillStyle = '#333';
  ctx.font = `${Math.max(14, boxW * 0.05)}px Comic Sans MS`;
  ctx.fillText('Tap or press any key to play again', W/2, H/2 + 35);

  for (let i = 0; i < 12; i++) {
    const sx = bx + 20 + (i % 4) * (boxW/4);
    const sy = by + 20 + Math.floor(i/4) * 50;
    ctx.fillStyle = i % 2 === 0 ? '#FFD700' : '#FFA500';
    drawStar(sx, sy, 5, 10, 5);
  }
  ctx.restore();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawStar(cx, cy, spikes, outer, inner) {
  let rot = Math.PI/2 * 3, x = cx, y = cy, step = Math.PI/spikes;
  ctx.beginPath(); ctx.moveTo(cx, cy - outer);
  for (let i = 0; i < spikes; i++) {
    x = cx + Math.cos(rot) * outer; y = cy + Math.sin(rot) * outer; ctx.lineTo(x, y); rot += step;
    x = cx + Math.cos(rot) * inner; y = cy + Math.sin(rot) * inner; ctx.lineTo(x, y); rot += step;
  }
  ctx.lineTo(cx, cy - outer); ctx.closePath(); ctx.fill();
}

function update() {
  if (gameOver) return;

  worm1.x += (worm1.targetX - worm1.x) * 0.15;
  worm2.x += (worm2.targetX - worm2.x) * 0.15;

  spawnTimer++;
  if (spawnTimer > spawnInterval) {
    spawnFood();
    spawnTimer = 0;
    spawnInterval = Math.max(25, 60 - score * 2);
  }

  for (let i = foods.length - 1; i >= 0; i--) {
    let f = foods[i];
    f.y += f.speed;
    f.rot += f.rotSpeed;

    for (let w of [worm1, worm2]) {
      const dx = f.x - w.x;
      const dy = f.y - (w.y + 8);
      if (Math.abs(dx) < 32 && Math.abs(dy) < 32) {
        tubeFoods.push({
          worm: w,
          type: f.type,
          progress: 0
        });
        foods.splice(i, 1);
        playChomp();
        addParticles(w.x, w.y + 20, w.color);
        break;
      }
    }

    if (f.y > H + 20) {
      foods.splice(i, 1);
      playMiss();
    }
  }

  // Advance food through tubes
  for (let tf of tubeFoods) {
    tf.progress += 0.008;
    if (tf.progress > 1) tf.progress = 1;
  }

  // Update pooped foods
  for (let i = poopedFoods.length - 1; i >= 0; i--) {
    let p = poopedFoods[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.3;
    p.rot += p.rotSpeed;
    if (p.y > H + 50) poopedFoods.splice(i, 1);
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function draw() {
  const time = Date.now();
  ctx.clearRect(0, 0, W, H);

  ctx.fillStyle = '#87CEEB';
  ctx.fillRect(0, 0, W, H);
  drawClouds();
  drawGround();

  // Falling foods
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let f of foods) {
    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.rotate(f.rot);
    ctx.font = `${f.size}px sans-serif`;
    ctx.fillText(f.type, 0, 0);
    ctx.restore();
  }

  // Worms (tube foods drawn inside)
  drawWorm(worm1, time);
  drawWorm(worm2, time);

  // Pooped foods
  for (let p of poopedFoods) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.font = '28px sans-serif';
    ctx.fillText(p.type, 0, 0);
    ctx.restore();
  }

  // Particles
  for (let p of particles) {
    ctx.globalAlpha = p.life / 30;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, 5, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // GO OUT button
  drawOutButton();

  // Score
  ctx.fillStyle = '#333';
  ctx.font = `bold ${Math.max(14, W * 0.025)}px Comic Sans MS`;
  ctx.textAlign = 'left';
  ctx.fillText(`Out: ${score} / ${foodsNeeded}`, 20, 40);

  // Hint
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.font = `${Math.max(12, W * 0.02)}px Comic Sans MS`;
  ctx.textAlign = 'center';
  ctx.fillText('Drag worms to eat, then press GO OUT!', W/2, H - 10);

  if (gameOver) drawGameOver();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
